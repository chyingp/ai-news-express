# 巨头企业识别：按文章标题/摘要中的别名匹配所属企业，用于首页"按企业筛选"。
# 关键词机制不依赖官方源是否存在，故国内厂商、无 RSS 的公司也能被正确归类。
# key 为内部标识，label 为展示名，aliases 为匹配别名（英文按词边界、中文按子串匹配）。
