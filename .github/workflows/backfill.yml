name: Backfill Translations

on:
  workflow_dispatch:
    inputs:
      date:
        description: "只补翻指定日期 (YYYY-MM-DD)，留空则处理全部历史数据"
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: cd src && python backfill.py "${{ inputs.date }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ output/
          git diff --staged --quiet || git commit -m "chore: backfill translations $(date -u +%Y-%m-%dT%H:%M)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

  deploy:
    needs: backfill
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
