name: NBS Reachability Probe

# 一次性探测：确认 GitHub Actions 跑在海外时能否访问国家统计局数据接口。
# 手动触发，结果只打到日志，不提交任何文件。验证完成后可删除本工作流。
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Probe NBS endpoint
        run: python src/nbs.py
